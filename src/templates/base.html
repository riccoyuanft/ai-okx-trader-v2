<!DOCTYPE html>
<html lang="zh-CN" class="h-full bg-gray-950">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>{% block title %}AI OKX Trader{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    .log-panel { font-family: 'Courier New', Courier, monospace; }
    @media (max-width: 640px) {
      body { font-size: 14px; }
    }
  </style>
</head>
<body class="h-full text-gray-100">

  {% if user is defined and user %}
  {% set is_testnet = user.okx_testnet if user.okx_testnet is defined else true %}
  <!-- Navigation -->
  <nav class="relative bg-gray-900 border-b border-gray-800 px-4 sm:px-6 py-3" x-data="{ open: false }">
    <div class="flex items-center justify-between">
      <!-- Logo + mode badge -->
      <div class="flex items-center gap-3">
        <span class="font-bold text-blue-400 text-base">AI OKX Trader</span>
        <a href="/account" class="{% if is_testnet %}bg-blue-900/60 text-blue-300 border-blue-800{% else %}bg-yellow-900/60 text-yellow-300 border-yellow-800{% endif %} border text-xs px-2 py-0.5 rounded font-medium leading-tight">
          {% if is_testnet %}模拟盘{% else %}实盘{% endif %}
        </a>
      </div>

      <!-- Desktop links -->
      <div class="hidden md:flex items-center gap-5">
        <a href="/dashboard" class="text-sm {% if request.url.path == '/dashboard' %}text-white font-medium{% else %}text-gray-400 hover:text-white{% endif %}">控制台</a>
        <a href="/strategies" class="text-sm {% if '/strategies' in request.url.path %}text-white font-medium{% else %}text-gray-400 hover:text-white{% endif %}">策略</a>
        <a href="/trades" class="text-sm {% if request.url.path == '/trades' %}text-white font-medium{% else %}text-gray-400 hover:text-white{% endif %}">交易记录</a>
        <a href="/account" class="text-sm {% if request.url.path == '/account' %}text-white font-medium{% else %}text-gray-400 hover:text-white{% endif %}">账户</a>
        <span class="text-xs text-gray-600">|</span>
        <span class="text-xs text-gray-500 truncate max-w-[100px]">{{ user.unique_id }}</span>
        <form action="/logout" method="post">
          <button type="submit" class="text-xs text-gray-500 hover:text-gray-300">退出</button>
        </form>
      </div>

      <!-- Mobile: mode badge + hamburger -->
      <div class="flex items-center gap-2 md:hidden">
        <button @click="open = !open" class="p-1.5 text-gray-400 hover:text-white">
          <svg x-show="!open" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
          <svg x-show="open" x-cloak class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Mobile overlay menu (absolute, does not push content) -->
    <div x-show="open" x-cloak @click.away="open=false"
      class="md:hidden absolute top-full left-0 right-0 z-50 bg-gray-900 border-b border-gray-800 shadow-xl">
      <div class="px-4 py-3 space-y-0.5">
        <a href="/dashboard" @click="open=false"
          class="flex items-center px-3 py-2.5 rounded-lg text-sm {% if request.url.path == '/dashboard' %}bg-gray-800 text-white font-medium{% else %}text-gray-400 hover:bg-gray-800 hover:text-white{% endif %}">控制台</a>
        <a href="/strategies" @click="open=false"
          class="flex items-center px-3 py-2.5 rounded-lg text-sm {% if '/strategies' in request.url.path %}bg-gray-800 text-white font-medium{% else %}text-gray-400 hover:bg-gray-800 hover:text-white{% endif %}">策略</a>
        <a href="/trades" @click="open=false"
          class="flex items-center px-3 py-2.5 rounded-lg text-sm {% if request.url.path == '/trades' %}bg-gray-800 text-white font-medium{% else %}text-gray-400 hover:bg-gray-800 hover:text-white{% endif %}">交易记录</a>
        <a href="/account" @click="open=false"
          class="flex items-center px-3 py-2.5 rounded-lg text-sm {% if request.url.path == '/account' %}bg-gray-800 text-white font-medium{% else %}text-gray-400 hover:bg-gray-800 hover:text-white{% endif %}">账户设置</a>
      </div>
      <div class="px-4 py-3 border-t border-gray-800 flex items-center justify-between">
        <span class="text-xs text-gray-500 truncate">{{ user.unique_id }}</span>
        <form action="/logout" method="post">
          <button type="submit" class="text-xs text-gray-500 hover:text-red-400">退出登录</button>
        </form>
      </div>
    </div>
  </nav>
  {% endif %}

  <main class="{% if user is defined and user %}p-3 sm:p-6{% endif %}">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
